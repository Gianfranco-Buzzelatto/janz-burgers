version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: janz_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: janzburgers

  backend:
    build: ./backend
    container_name: janz_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/janzburgers
      - JWT_SECRET=janz_burgers_super_secret_2024
      - PORT=5000
      - FRONTEND_URL=http://localhost:3000
      # WhatsApp - Completar con credenciales reales
      - WHATSAPP_PHONE_NUMBER_ID=YOUR_PHONE_NUMBER_ID
      - WHATSAPP_ACCESS_TOKEN=YOUR_ACCESS_TOKEN
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: janz_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    depends_on:
      - backend

volumes:
  mongo_data:
